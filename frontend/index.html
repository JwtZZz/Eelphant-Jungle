<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>区块链工具箱</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --font-serif: Georgia, 'Times New Roman', serif;
      --font-sans: 'Inter', 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', Arial, sans-serif;
      --bg-page: #f5f4ed;
      --bg-surface: #faf9f5;
      --bg-user: #ebe5d8;
      --bg-bot: #fffefb;
      --bg-input: #faf9f5;
      --bg-toggle: #faf9f5;
      --bg-toggle-active: #e8e6dc;
      --text-primary: #141413;
      --text-secondary: #5e5d59;
      --text-user: #3d3d3a;
      --text-muted: #87867f;
      --border-soft: #f0eee6;
      --border-warm: #e8e6dc;
      --ring-warm: #d1cfc5;
      --accent: #c96442;
      --shadow-soft: rgba(20,20,19,0.03);
      --shadow-lift: rgba(0,0,0,0.03);
      --theme-button-text: #141413;
    }

    body[data-theme="dark"] {
      --bg-page: #141413;
      --bg-surface: #30302e;
      --bg-user: #4d3f33;
      --bg-bot: #2a2a28;
      --bg-input: #232321;
      --bg-toggle: #232321;
      --bg-toggle-active: #30302e;
      --text-primary: #faf9f5;
      --text-secondary: #b0aea5;
      --text-user: #faf9f5;
      --text-muted: #87867f;
      --border-soft: #30302e;
      --border-warm: #4d4c48;
      --ring-warm: #4d4c48;
      --accent: #d97757;
      --shadow-soft: rgba(0,0,0,0.18);
      --shadow-lift: rgba(0,0,0,0.12);
      --theme-button-text: #faf9f5;
    }

    body {
      min-height: 100vh;
      background: var(--bg-page);
      color: var(--text-primary);
      font-family: var(--font-sans);
      line-height: 1.60;
      transition: background 0.25s ease, color 0.25s ease;
    }

    .layout { display: flex; min-height: 100vh; }

    .main {
      flex: 1;
      padding: 28px 20px 28px 28px;
      min-width: 0;
    }

    .workspace-shell {
      min-height: calc(100vh - 56px);
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr);
      gap: 20px;
    }

    .workspace-sidebar {
      background: var(--bg-surface);
      border: 1px solid var(--border-soft);
      border-radius: 24px;
      box-shadow: 0 4px 24px var(--shadow-soft);
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .brand-mark {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 6px 6px 2px;
    }

    .brand-title {
      color: var(--text-primary);
      font-family: var(--font-serif);
      font-size: 28px;
      line-height: 1.1;
      letter-spacing: -0.03em;
    }

    .brand-subtitle {
      margin-top: 4px;
      color: var(--text-secondary);
      font-size: 13px;
      line-height: 1.5;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 6px color-mix(in srgb, var(--accent) 16%, transparent);
      flex: 0 0 auto;
    }

    .nav-group-label {
      padding: 0 8px;
      color: var(--text-muted);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .nav-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .nav-item {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 14px;
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid transparent;
      border-radius: 18px;
      box-shadow: none;
      font-family: var(--font-sans);
      font-size: 15px;
      line-height: 1.2;
      text-align: left;
    }

    .nav-item:hover {
      background: color-mix(in srgb, var(--bg-toggle-active) 72%, transparent);
      color: var(--text-primary);
      opacity: 1;
    }

    .nav-item.active {
      background: color-mix(in srgb, var(--bg-toggle-active) 88%, transparent);
      color: var(--text-primary);
      border-color: var(--border-warm);
      box-shadow: 0 0 0 1px var(--shadow-lift);
    }

    .nav-icon {
      width: 30px;
      height: 30px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--accent) 14%, var(--bg-surface));
      color: var(--accent);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-serif);
      font-size: 14px;
      flex: 0 0 auto;
    }

    .workspace-panel {
      background: var(--bg-surface);
      border: 1px solid var(--border-soft);
      border-radius: 32px;
      box-shadow: 0 4px 24px var(--shadow-soft);
      padding: 34px 34px 28px;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .workspace-view {
      display: none;
      min-width: 0;
    }

    .workspace-view.active {
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .workspace-empty {
      flex: 1;
      min-height: calc(100vh - 150px);
      border: 1px dashed var(--border-warm);
      border-radius: 28px;
      background: color-mix(in srgb, var(--bg-toggle-active) 28%, transparent);
      box-shadow: inset 0 0 0 1px var(--shadow-lift);
    }

    .hero-block {
      display: flex;
      justify-content: space-between;
      gap: 24px;
      align-items: flex-start;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border-soft);
    }

    .hero-eyebrow {
      color: var(--accent);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .hero-title {
      max-width: 700px;
      color: var(--text-primary);
      font-family: var(--font-serif);
      font-size: 52px;
      line-height: 1.05;
      letter-spacing: -0.04em;
    }

    .hero-copy {
      max-width: 760px;
      margin-top: 16px;
      color: var(--text-secondary);
      font-size: 18px;
      line-height: 1.65;
    }

    .hero-stat {
      min-width: 180px;
      padding: 18px 18px 16px;
      border: 1px solid var(--border-warm);
      border-radius: 20px;
      background: color-mix(in srgb, var(--bg-toggle-active) 48%, var(--bg-surface));
      box-shadow: 0 0 0 1px var(--shadow-lift);
    }

    .hero-stat-label {
      color: var(--text-muted);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .hero-stat-value {
      margin-top: 10px;
      color: var(--text-primary);
      font-family: var(--font-serif);
      font-size: 34px;
      line-height: 1;
    }

    .section-title {
      color: var(--text-primary);
      font-family: var(--font-serif);
      font-size: 28px;
      line-height: 1.1;
      letter-spacing: -0.03em;
      margin-bottom: 16px;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .info-card {
      padding: 20px 20px 18px;
      background: color-mix(in srgb, var(--bg-toggle-active) 40%, var(--bg-surface));
      border: 1px solid var(--border-warm);
      border-radius: 22px;
      box-shadow: 0 0 0 1px var(--shadow-lift);
      min-width: 0;
    }

    .info-card-wide {
      grid-column: 1 / -1;
    }

    .card-kicker {
      color: var(--accent);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .card-title {
      color: var(--text-primary);
      font-family: var(--font-serif);
      font-size: 24px;
      line-height: 1.15;
      letter-spacing: -0.02em;
    }

    .card-copy {
      margin-top: 12px;
      color: var(--text-secondary);
      font-size: 15px;
      line-height: 1.7;
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 32px;
      padding: 0 12px;
      border-radius: 999px;
      border: 1px solid var(--border-warm);
      background: var(--bg-surface);
      color: var(--text-secondary);
      font-size: 13px;
      line-height: 1;
    }

    .list-panel {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .list-card {
      padding: 20px;
      border-radius: 22px;
      border: 1px solid var(--border-soft);
      background: var(--bg-surface);
      box-shadow: 0 0 0 1px var(--shadow-lift);
    }

    .list-card h4 {
      color: var(--text-primary);
      font-family: var(--font-serif);
      font-size: 22px;
      line-height: 1.2;
      letter-spacing: -0.02em;
    }

    .mini-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 14px;
    }

    .mini-item {
      padding-top: 12px;
      border-top: 1px solid var(--border-soft);
      color: var(--text-secondary);
      font-size: 15px;
      line-height: 1.6;
    }

    .mini-item strong {
      color: var(--text-primary);
      font-weight: 600;
    }

    .right-panel {
      width: 33.33%;
      padding: 40px 32px;
      position: relative;
    }

    .theme-toggle {
      position: absolute;
      top: 28px;
      right: 32px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px;
      background: var(--bg-toggle);
      border: 1px solid var(--border-soft);
      border-radius: 999px;
      box-shadow: 0 0 0 1px var(--shadow-lift);
      z-index: 5;
    }

    .theme-chip {
      border: none;
      border-radius: 999px;
      padding: 8px 12px;
      min-width: 56px;
      background: transparent;
      color: var(--text-secondary);
      box-shadow: none;
      font-family: var(--font-sans);
      font-size: 13px;
      line-height: 1;
      font-weight: 500;
      letter-spacing: 0.01em;
      cursor: pointer;
    }

    .theme-chip.active {
      background: var(--bg-toggle-active);
      color: var(--theme-button-text);
      box-shadow: 0 0 0 1px var(--ring-warm);
    }

    .chat-stage::before {
      content: 'JwtZZz1';
      position: absolute;
      top: -74px;
      left: 0;
      color: var(--text-primary);
      font-family: var(--font-serif);
      font-size: 28px;
      line-height: 1.2;
      letter-spacing: -0.02em;
    }

    .chat-stage {
      position: relative;
      margin-top: 56px;
      margin-bottom: 20px;
    }

    .chat-box {
      background: var(--bg-surface);
      border: 1px solid var(--border-soft);
      border-radius: 12px;
      height: calc(100vh - 210px);
      min-height: 680px;
      overflow: auto;
      padding: 20px;
      box-shadow: 0px 0px 0px 1px var(--shadow-lift);
      scrollbar-width: none;
      -ms-overflow-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .chat-box::-webkit-scrollbar {
      display: none;
    }

    .msg {
      max-width: 78%;
      padding: 10px 14px;
      border-radius: 14px;
      font-family: var(--font-sans);
      font-size: 15px;
      line-height: 1.45;
      box-shadow: 0 4px 12px var(--shadow-soft);
    }

    .msg.user {
      align-self: flex-end;
      background: var(--bg-user);
      color: var(--text-user);
    }

    .msg.bot {
      align-self: flex-start;
      background: var(--bg-bot);
      border: 1px solid var(--border-warm);
    }

    .msg.assistant {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
    }

    .msg-content {
      color: var(--text-primary);
      font-family: var(--font-serif);
      font-size: 16px;
      line-height: 1.45;
      letter-spacing: -0.01em;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .thinking-inline {
      display: inline-block;
    }

    .msg-actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      padding-left: 4px;
      margin-top: 2px;
    }

    .msg-action-btn {
      min-width: 0;
      height: 32px;
      padding: 0 12px 0 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: var(--bg-surface);
      color: var(--text-secondary);
      border: 1px solid var(--border-warm);
      border-radius: 999px;
      box-shadow: 0 0 0 1px var(--shadow-lift);
      font-family: var(--font-sans);
      font-size: 13px;
      line-height: 1;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
    }

    .msg-action-btn:hover {
      background: var(--border-warm);
      color: var(--text-primary);
      border-color: var(--ring-warm);
    }

    .msg-action-btn svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .msg-action-label {
      display: inline-block;
      white-space: nowrap;
    }


    .msg p { margin: 0; }

    .chat-sprite-track {
      position: absolute;
      inset: -22px;
      pointer-events: none;
      z-index: 2;
    }

    .input-row {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .input-wrap {
      flex: 1;
      position: relative;
    }

    .input-sprite-track {
      position: absolute;
      inset: -18px;
      pointer-events: none;
      z-index: 2;
    }

    .sprite-shell {
      position: absolute;
      left: 0;
      top: 0;
      width: 64px;
      height: 64px;
      animation: sprite-bob 900ms ease-in-out infinite alternate;
      will-change: transform;
    }

    .sprite-avatar {
      width: 32px;
      height: 32px;
      background-image: url('/sheet.png');
      background-repeat: no-repeat;
      image-rendering: pixelated;
      transform: scale(2);
      transform-origin: top left;
    }

    .sprite-avatar.idle {
      background-position: 0 -16px;
    }

    .sprite-avatar.typing {
      background-position: 0 -64px;
      animation: run-cycle 820ms steps(7) infinite;
    }

    .sprite-shell.facing-left .sprite-avatar {
      transform: translateX(64px) scale(-2, 2);
      transform-origin: top left;
    }

    .sprite-shell.facing-right .sprite-avatar {
      transform: scale(2);
      transform-origin: top left;
    }

    @keyframes run-cycle {
      from { background-position: 0 -64px; }
      to { background-position: -224px -64px; }
    }

    @keyframes sprite-bob {
      from { margin-top: 1px; }
      to { margin-top: -1px; }
    }


    input {
      flex: 1;
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--border-warm);
      border-radius: 12px;
      background: var(--bg-input);
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 15px;
      outline: none;
      box-shadow: 0px 0px 0px 1px var(--border-warm);
      transition: box-shadow 0.2s ease;
      cursor: text;
      caret-color: var(--accent);
    }

    input::placeholder {
      color: var(--text-muted);
    }

    input:focus {
      box-shadow: 0px 0px 0px 2px var(--accent);
      border-color: var(--accent);
    }

    .send-button {
      padding: 12px 22px;
      background: var(--accent);
      color: #faf9f5;
      border: none;
      border-radius: 12px;
      font-family: var(--font-serif);
      font-size: 18px;
      line-height: 1;
      letter-spacing: -0.01em;
      font-weight: 500;
      cursor: pointer;
      box-shadow: 0px 0px 0px 1px var(--accent);
      transition: opacity 0.2s ease;
    }

    .send-button:hover {
      opacity: 0.9;
    }

    @media (max-width: 1180px) {
      .layout {
        flex-direction: column;
      }

      .main,
      .right-panel {
        width: 100%;
      }

      .workspace-shell {
        grid-template-columns: 1fr;
      }

      .right-panel {
        padding-top: 0;
      }

      .theme-toggle {
        top: 20px;
      }
    }

    @media (max-width: 760px) {
      .main {
        padding: 20px 14px 14px;
      }

      .workspace-sidebar,
      .workspace-panel {
        border-radius: 22px;
      }

      .workspace-panel {
        padding: 22px 18px;
      }

      .hero-block,
      .list-panel,
      .card-grid {
        grid-template-columns: 1fr;
        display: flex;
        flex-direction: column;
      }

      .hero-title {
        font-size: 38px;
      }

      .right-panel {
        padding: 18px 14px 24px;
      }

      .theme-toggle {
        right: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <div class="main">
      <div class="workspace-shell">
        <aside class="workspace-sidebar">
          <div class="brand-mark">
            <div>
              <div class="brand-title">Elephant Jungle</div>
             
            </div>
            <span class="status-dot" aria-hidden="true"></span>
          </div>

          <div>
            <div class="nav-group-label">Workspace</div>
            <div class="nav-list">
              <button class="nav-item" type="button" data-view="markets">
                <span class="nav-icon">01</span>
                <span>Markets</span>
              </button>
              <button class="nav-item active" type="button" data-view="overview">
                <span class="nav-icon">02</span>
                <span>Overview</span>
              </button>
              <button class="nav-item" type="button" data-view="policy">
                <span class="nav-icon">03</span>
                <span>Policy</span>
              </button>
              <button class="nav-item" type="button" data-view="projects">
                <span class="nav-icon">04</span>
                <span>Projects</span>
              </button>
              <button class="nav-item" type="button" data-view="research">
                <span class="nav-icon">05</span>
                <span>Research</span>
              </button>
            </div>
          </div>
        </aside>

        <section class="workspace-panel">
          <div class="workspace-view active" data-view-panel="overview">
            <div class="workspace-empty" aria-hidden="true"></div>
          </div>

          <div class="workspace-view" data-view-panel="markets">
            <div class="workspace-empty" aria-hidden="true"></div>
          </div>

          <div class="workspace-view" data-view-panel="policy">
            <div class="workspace-empty" aria-hidden="true"></div>
          </div>

          <div class="workspace-view" data-view-panel="projects">
            <div class="workspace-empty" aria-hidden="true"></div>
          </div>

          <div class="workspace-view" data-view-panel="research">
            <div class="workspace-empty" aria-hidden="true"></div>
          </div>
        </section>
      </div>
    </div>
    <div class="right-panel">
      <div class="theme-toggle" aria-label="Theme toggle">
        <button class="theme-chip active" id="lightModeBtn" type="button">Day</button>
        <button class="theme-chip" id="darkModeBtn" type="button">Night</button>
      </div>
      <div class="chat-stage">
        <div class="chat-sprite-track" id="spriteTrack" aria-hidden="true">
          <div class="sprite-shell facing-right" id="spriteShell">
            <div class="sprite-avatar idle" id="inputSprite"></div>
          </div>
        </div>
        <div class="chat-box" id="chatBox"></div>
      </div>
      <div class="input-row">
        <div class="input-wrap">
          <div class="input-sprite-track" id="inputSpriteTrack" aria-hidden="true">
            <div class="sprite-shell facing-left" id="inputSpriteShell">
              <div class="sprite-avatar idle" id="inputSpriteMirror"></div>
            </div>
          </div>
          <input type="text" id="input" placeholder="问点什么..." />
        </div>
          <button class="send-button" onclick="sendMessage()">Send</button>
        </div>
      </div>
  </div>
  <script>
    const body = document.body;
    const chatBox = document.getElementById('chatBox');
    const input = document.getElementById('input');
    const sendButton = document.querySelector('.send-button');
    const lightModeBtn = document.getElementById('lightModeBtn');
    const darkModeBtn = document.getElementById('darkModeBtn');
    const inputSprite = document.getElementById('inputSprite');
    const spriteShell = document.getElementById('spriteShell');
    const spriteTrack = document.getElementById('spriteTrack');
    const inputSpriteMirror = document.getElementById('inputSpriteMirror');
    const inputSpriteShell = document.getElementById('inputSpriteShell');
    const inputSpriteTrack = document.getElementById('inputSpriteTrack');
    const navItems = Array.from(document.querySelectorAll('.nav-item'));
    const viewPanels = Array.from(document.querySelectorAll('.workspace-view'));
    let typingTimer;
    let streamTimer;
    let animationFrame = null;
    let isStreaming = false;
    let lastFrameTime = 0;
    let currentSpeed = 0.85;
    const THEME_KEY = 'elephant-jungle-theme';
    const REQUEST_TIMEOUT_MS = 20000;
    const spriteWidth = 64;
    const cruiseSpeed = 0.85;
    const typingSpeed = 2.2;
    const sprites = [
      {
        avatar: inputSprite,
        shell: spriteShell,
        track: spriteTrack,
        progress: 0,
        direction: 1,
      },
      {
        avatar: inputSpriteMirror,
        shell: inputSpriteShell,
        track: inputSpriteTrack,
        progress: 0,
        direction: -1,
      }
    ];

    function applyTheme(theme) {
      const nextTheme = theme === 'dark' ? 'dark' : 'light';
      body.dataset.theme = nextTheme;
      lightModeBtn.classList.toggle('active', nextTheme === 'light');
      darkModeBtn.classList.toggle('active', nextTheme === 'dark');
      localStorage.setItem(THEME_KEY, nextTheme);
    }

    function switchWorkspace(viewName) {
      navItems.forEach((item) => {
        item.classList.toggle('active', item.dataset.view === viewName);
      });
      viewPanels.forEach((panel) => {
        panel.classList.toggle('active', panel.dataset.viewPanel === viewName);
      });
    }

    function setSpriteState(state) {
      sprites.forEach((sprite) => {
        sprite.avatar.classList.remove('idle', 'typing');
        sprite.avatar.classList.add(state);
      });
    }

    function getTrackMetrics(sprite) {
      const width = Math.max(0, sprite.track.clientWidth - spriteWidth);
      const height = Math.max(0, sprite.track.clientHeight - spriteWidth);
      const perimeter = Math.max(1, 2 * (width + height));
      return { width, height, perimeter };
    }

    function getOrbitPosition(sprite) {
      const { width, height, perimeter } = getTrackMetrics(sprite);
      let progress = sprite.progress % perimeter;

      if (progress < 0) {
        progress += perimeter;
      }

      if (progress <= width) {
        return {
          x: progress,
          y: 0,
          facing: sprite.direction > 0 ? 'right' : 'left',
        };
      }

      if (progress <= width + height) {
        return {
          x: width,
          y: progress - width,
          facing: sprite.direction > 0 ? 'right' : 'left',
        };
      }

      if (progress <= (2 * width) + height) {
        return {
          x: width - (progress - width - height),
          y: height,
          facing: sprite.direction > 0 ? 'left' : 'right',
        };
      }

      return {
        x: 0,
        y: height - (progress - (2 * width) - height),
        facing: sprite.direction > 0 ? 'left' : 'right',
      };
    }

    function applySpritePosition(sprite) {
      const { x, y, facing } = getOrbitPosition(sprite);
      sprite.shell.style.left = `${x}px`;
      sprite.shell.style.top = `${y}px`;
      sprite.shell.classList.toggle('facing-left', facing === 'left');
      sprite.shell.classList.toggle('facing-right', facing === 'right');
    }

    function tickOrbit(timestamp = 0) {
      const delta = lastFrameTime ? Math.min(32, timestamp - lastFrameTime) : 16;
      lastFrameTime = timestamp;
      sprites.forEach((sprite) => {
        sprite.progress += sprite.direction * currentSpeed * (delta / 16);
        applySpritePosition(sprite);
      });
      animationFrame = requestAnimationFrame(tickOrbit);
    }

    function setCruiseMode() {
      currentSpeed = cruiseSpeed;
      setSpriteState('typing');
    }

    function boostSprites() {
      currentSpeed = typingSpeed;
      setSpriteState('typing');
      clearTimeout(typingTimer);
      typingTimer = setTimeout(() => {
        setCruiseMode();
      }, 900);
    }

    function createMessage(role, text = '') {
      const message = document.createElement('div');
      message.className = `msg ${role}`;
      if (role === 'bot') {
        message.classList.add('assistant');
      }

      const content = document.createElement('div');
      content.className = 'msg-content';
      content.textContent = text;

      message.appendChild(content);
      chatBox.appendChild(message);
      chatBox.scrollTop = chatBox.scrollHeight;

      return content;
    }

    function removeMessageActions(content) {
      const message = content.parentElement;
      const actions = message.querySelector('.msg-actions');
      if (actions) {
        actions.remove();
      }
    }

    function createIconMarkup(type) {
      if (type === 'copy') {
        return `
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <rect x="9" y="9" width="10" height="10" rx="2"></rect>
            <path d="M15 9V7a2 2 0 0 0-2-2H7a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"></path>
          </svg>
        `;
      }

      return `
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M20 11a8 8 0 1 0 2.2 5.5"></path>
          <path d="M20 4v7h-7"></path>
        </svg>
      `;
    }

    function attachMessageActions(content, query) {
      removeMessageActions(content);
      const message = content.parentElement;
      const actions = document.createElement('div');
      actions.className = 'msg-actions';

      const copyButton = document.createElement('button');
      copyButton.className = 'msg-action-btn';
      copyButton.type = 'button';
      copyButton.title = 'Copy';
      copyButton.innerHTML = `${createIconMarkup('copy')}<span class="msg-action-label">Copy</span>`;
      copyButton.addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(content.textContent || '');
          copyButton.style.color = '#c96442';
          setTimeout(() => {
            copyButton.style.color = '';
          }, 900);
        } catch (error) {
          console.error('Copy failed', error);
        }
      });

      const regenButton = document.createElement('button');
      regenButton.className = 'msg-action-btn';
      regenButton.type = 'button';
      regenButton.title = 'Regenerate';
      regenButton.innerHTML = `${createIconMarkup('regen')}<span class="msg-action-label">Retry</span>`;
      regenButton.addEventListener('click', async () => {
        if (!query || isStreaming) return;
        isStreaming = true;
        input.disabled = true;
        sendButton.disabled = true;
        removeMessageActions(content);
        content.classList.add('thinking-inline');

        const frames = [
          'T',
          'Th',
          'Thi',
          'Thin',
          'Think',
          'Thinki',
          'Thinkin',
          'Thinking',
          'Thinking.',
          'Thinking..',
          'Thinking...',
        ];
        const frameDelays = [55, 65, 75, 85, 95, 110, 125, 145, 175, 210, 250];
        let frameIndex = 0;
        let stopped = false;

        function tickThinking() {
          if (stopped) {
            return;
          }
          content.textContent = frames[frameIndex];
          const delay = frameDelays[frameIndex];
          frameIndex = (frameIndex + 1) % frames.length;
          setTimeout(tickThinking, delay);
        }

        tickThinking();

        try {
          const answer = await askBackend(query);
          stopped = true;
          await streamBotReply(answer, content, query);
        } catch (error) {
          stopped = true;
          await streamBotReply(`Backend error: ${error.message}`, content, query);
        }

        isStreaming = false;
        input.disabled = false;
        sendButton.disabled = false;
        input.focus();
      });

      actions.appendChild(copyButton);
      actions.appendChild(regenButton);
      message.appendChild(actions);
    }

    function createThinkingPlaceholder() {
      const content = createMessage('bot', 'Thinking...');
      content.classList.add('thinking-inline');

      const frames = [
        'T',
        'Th',
        'Thi',
        'Thin',
        'Think',
        'Thinki',
        'Thinkin',
        'Thinking',
        'Thinking.',
        'Thinking..',
        'Thinking...',
      ];
      const frameDelays = [55, 65, 75, 85, 95, 110, 125, 145, 175, 210, 250];
      let frameIndex = 0;
      let stopped = false;

      function tick() {
        if (stopped) {
          return;
        }
        content.textContent = frames[frameIndex];
        const delay = frameDelays[frameIndex];
        frameIndex = (frameIndex + 1) % frames.length;
        setTimeout(tick, delay);
      }

      tick();
      return {
        content,
        timer: {
          stop() {
            stopped = true;
          },
        },
      };
    }

    function streamBotReply(text, existingContent = null, query = '') {
      return streamMessage('bot', text, 38, 180, existingContent, query);
    }

    async function askBackend(query) {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), REQUEST_TIMEOUT_MS);
      let response;

      try {
        response = await fetch('http://127.0.0.1:8000/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query, top_k: 5 }),
          signal: controller.signal,
        });
      } catch (error) {
        clearTimeout(timeoutId);
        if (error.name === 'AbortError') {
          throw new Error('Request timed out, please retry.');
        }
        throw error;
      }

      clearTimeout(timeoutId);

      if (!response.ok) {
        let detail = 'request failed';
        try {
          const payload = await response.json();
          detail = payload.detail || detail;
        } catch (error) {
          detail = `${detail} (${response.status})`;
        }
        throw new Error(detail);
      }

      const payload = await response.json();
      return payload.answer || 'No answer returned.';
    }

    function streamMessage(role, text, speed = 38, initialDelay = 0, existingContent = null, query = '') {
      clearTimeout(streamTimer);
      const content = existingContent || createMessage(role, '');
      if (existingContent) {
        content.classList.remove('thinking-inline');
        content.textContent = '';
        removeMessageActions(content);
      }
      let index = 0;

      return new Promise((resolve) => {
        function tick() {
          index += 1;
          content.textContent = text.slice(0, index);
          chatBox.scrollTop = chatBox.scrollHeight;

          if (index < text.length) {
            streamTimer = setTimeout(tick, speed);
          } else {
            if (role === 'bot') {
              attachMessageActions(content, query);
            }
            resolve();
          }
        }

        if (!text.length) {
          resolve();
          return;
        }

        streamTimer = setTimeout(tick, initialDelay);
      });
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text || isStreaming) return;
      isStreaming = true;
      input.disabled = true;
      sendButton.disabled = true;
      input.value = '';
      clearTimeout(typingTimer);
      boostSprites();

      await streamMessage('user', text, 24, 0);
      const thinking = createThinkingPlaceholder();

      try {
        const answer = await askBackend(text);
        thinking.timer.stop();
        await streamBotReply(answer, thinking.content, text);
      } catch (error) {
        thinking.timer.stop();
        await streamBotReply(`Backend error: ${error.message}`, thinking.content, text);
      }

      setCruiseMode();
      input.disabled = false;
      sendButton.disabled = false;
      input.focus();
      isStreaming = false;
    }
    input.addEventListener('input', () => {
      boostSprites();
    });
    input.addEventListener('blur', () => {
      clearTimeout(typingTimer);
      setCruiseMode();
    });
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
    lightModeBtn.addEventListener('click', () => applyTheme('light'));
    darkModeBtn.addEventListener('click', () => applyTheme('dark'));
    navItems.forEach((item) => {
      item.addEventListener('click', () => switchWorkspace(item.dataset.view));
    });
    window.addEventListener('resize', () => {
      sprites.forEach((sprite) => {
        applySpritePosition(sprite);
      });
    });
    applyTheme(localStorage.getItem(THEME_KEY) || 'light');
    switchWorkspace('overview');
    setCruiseMode();
    sprites[1].progress = getTrackMetrics(sprites[1]).perimeter / 2;
    sprites.forEach((sprite) => {
      applySpritePosition(sprite);
    });
    animationFrame = requestAnimationFrame(tickOrbit);
  </script>
</body>
</html>

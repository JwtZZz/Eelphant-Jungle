<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>区块链工具箱</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --font-serif: Georgia, 'Times New Roman', serif;
      --font-sans: 'Inter', 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: #f5f4ed;
      color: #141413;
      font-family: var(--font-sans);
      line-height: 1.60;
    }

    .layout { display: flex; min-height: 100vh; }

    .main { flex: 1; }

    .right-panel {
      width: 33.33%;
      padding: 40px 32px;
    }

    .chat-stage::before {
      content: 'JwtZZz1';
      position: absolute;
      top: -74px;
      left: 0;
      color: #141413;
      font-family: var(--font-serif);
      font-size: 28px;
      line-height: 1.2;
      letter-spacing: -0.02em;
    }

    .chat-stage {
      position: relative;
      margin-top: 56px;
      margin-bottom: 20px;
    }

    .chat-box {
      background: #faf9f5;
      border: 1px solid #f0eee6;
      border-radius: 12px;
      height: 520px;
      overflow: auto;
      padding: 20px;
      box-shadow: 0px 0px 0px 1px rgba(0,0,0,0.03);
      scrollbar-width: none;
      -ms-overflow-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .chat-box::-webkit-scrollbar {
      display: none;
    }

    .msg {
      max-width: 78%;
      padding: 10px 14px;
      border-radius: 14px;
      font-family: var(--font-sans);
      font-size: 15px;
      line-height: 1.45;
      box-shadow: 0 4px 12px rgba(20,20,19,0.03);
    }

    .msg.user {
      align-self: flex-end;
      background: #ebe5d8;
      color: #3d3d3a;
    }

    .msg.bot {
      align-self: flex-start;
      background: #fffefb;
      border: 1px solid #eee8dc;
    }

    .msg.assistant {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
    }

    .msg-content {
      color: #141413;
      font-family: var(--font-serif);
      font-size: 16px;
      line-height: 1.45;
      letter-spacing: -0.01em;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .thinking-inline {
      display: inline-block;
    }

    .msg-actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      padding-left: 4px;
      margin-top: 2px;
    }

    .msg-action-btn {
      min-width: 0;
      height: 32px;
      padding: 0 12px 0 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #faf9f5;
      color: #5e5d59;
      border: 1px solid #e8e6dc;
      border-radius: 999px;
      box-shadow: 0 0 0 1px rgba(20,20,19,0.03);
      font-family: var(--font-sans);
      font-size: 13px;
      line-height: 1;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
    }

    .msg-action-btn:hover {
      background: #e8e6dc;
      color: #141413;
      border-color: #d1cfc5;
    }

    .msg-action-btn svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .msg-action-label {
      display: inline-block;
      white-space: nowrap;
    }


    .msg p { margin: 0; }

    .chat-sprite-track {
      position: absolute;
      inset: -22px;
      pointer-events: none;
      z-index: 2;
    }

    .input-row {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .input-wrap {
      flex: 1;
      position: relative;
    }

    .input-sprite-track {
      position: absolute;
      inset: -18px;
      pointer-events: none;
      z-index: 2;
    }

    .sprite-shell {
      position: absolute;
      left: 0;
      top: 0;
      width: 64px;
      height: 64px;
      animation: sprite-bob 900ms ease-in-out infinite alternate;
      will-change: transform;
    }

    .sprite-avatar {
      width: 32px;
      height: 32px;
      background-image: url('/sheet.png');
      background-repeat: no-repeat;
      image-rendering: pixelated;
      transform: scale(2);
      transform-origin: top left;
    }

    .sprite-avatar.idle {
      background-position: 0 -16px;
    }

    .sprite-avatar.typing {
      background-position: 0 -64px;
      animation: run-cycle 820ms steps(7) infinite;
    }

    .sprite-shell.facing-left .sprite-avatar {
      transform: translateX(64px) scale(-2, 2);
      transform-origin: top left;
    }

    .sprite-shell.facing-right .sprite-avatar {
      transform: scale(2);
      transform-origin: top left;
    }

    @keyframes run-cycle {
      from { background-position: 0 -64px; }
      to { background-position: -224px -64px; }
    }

    @keyframes sprite-bob {
      from { margin-top: 1px; }
      to { margin-top: -1px; }
    }


    input {
      flex: 1;
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #e8e6dc;
      border-radius: 12px;
      background: #faf9f5;
      color: #141413;
      font-family: var(--font-sans);
      font-size: 15px;
      outline: none;
      box-shadow: 0px 0px 0px 1px #e8e6dc;
      transition: box-shadow 0.2s ease;
      cursor: text;
      caret-color: #c96442;
    }

    input::placeholder {
      color: #87867f;
    }

    input:focus {
      box-shadow: 0px 0px 0px 2px #c96442;
      border-color:#c96442;
    }

    button {
      padding: 12px 22px;
      background: #c96442;
      color: #faf9f5;
      border: none;
      border-radius: 12px;
      font-family: var(--font-serif);
      font-size: 18px;
      line-height: 1;
      letter-spacing: -0.01em;
      font-weight: 500;
      cursor: pointer;
      box-shadow: 0px 0px 0px 1px #c96442;
      transition: opacity 0.2s ease;
    }

    button:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="layout">
    <div class="main"></div>
    <div class="right-panel">
      <div class="chat-stage">
        <div class="chat-sprite-track" id="spriteTrack" aria-hidden="true">
          <div class="sprite-shell facing-right" id="spriteShell">
            <div class="sprite-avatar idle" id="inputSprite"></div>
          </div>
        </div>
        <div class="chat-box" id="chatBox"></div>
      </div>
      <div class="input-row">
        <div class="input-wrap">
          <div class="input-sprite-track" id="inputSpriteTrack" aria-hidden="true">
            <div class="sprite-shell facing-left" id="inputSpriteShell">
              <div class="sprite-avatar idle" id="inputSpriteMirror"></div>
            </div>
          </div>
          <input type="text" id="input" placeholder="问点什么..." />
        </div>
          <button onclick="sendMessage()">Send</button>
        </div>
      </div>
  </div>
  <script>
    const chatBox = document.getElementById('chatBox');
    const input = document.getElementById('input');
    const sendButton = document.querySelector('button');
    const inputSprite = document.getElementById('inputSprite');
    const spriteShell = document.getElementById('spriteShell');
    const spriteTrack = document.getElementById('spriteTrack');
    const inputSpriteMirror = document.getElementById('inputSpriteMirror');
    const inputSpriteShell = document.getElementById('inputSpriteShell');
    const inputSpriteTrack = document.getElementById('inputSpriteTrack');
    let typingTimer;
    let streamTimer;
    let animationFrame = null;
    let isStreaming = false;
    let lastFrameTime = 0;
    let currentSpeed = 0.85;
    const spriteWidth = 64;
    const cruiseSpeed = 0.85;
    const typingSpeed = 2.2;
    const sprites = [
      {
        avatar: inputSprite,
        shell: spriteShell,
        track: spriteTrack,
        progress: 0,
        direction: 1,
      },
      {
        avatar: inputSpriteMirror,
        shell: inputSpriteShell,
        track: inputSpriteTrack,
        progress: 0,
        direction: -1,
      }
    ];

    function setSpriteState(state) {
      sprites.forEach((sprite) => {
        sprite.avatar.classList.remove('idle', 'typing');
        sprite.avatar.classList.add(state);
      });
    }

    function getTrackMetrics(sprite) {
      const width = Math.max(0, sprite.track.clientWidth - spriteWidth);
      const height = Math.max(0, sprite.track.clientHeight - spriteWidth);
      const perimeter = Math.max(1, 2 * (width + height));
      return { width, height, perimeter };
    }

    function getOrbitPosition(sprite) {
      const { width, height, perimeter } = getTrackMetrics(sprite);
      let progress = sprite.progress % perimeter;

      if (progress < 0) {
        progress += perimeter;
      }

      if (progress <= width) {
        return {
          x: progress,
          y: 0,
          facing: sprite.direction > 0 ? 'right' : 'left',
        };
      }

      if (progress <= width + height) {
        return {
          x: width,
          y: progress - width,
          facing: sprite.direction > 0 ? 'right' : 'left',
        };
      }

      if (progress <= (2 * width) + height) {
        return {
          x: width - (progress - width - height),
          y: height,
          facing: sprite.direction > 0 ? 'left' : 'right',
        };
      }

      return {
        x: 0,
        y: height - (progress - (2 * width) - height),
        facing: sprite.direction > 0 ? 'left' : 'right',
      };
    }

    function applySpritePosition(sprite) {
      const { x, y, facing } = getOrbitPosition(sprite);
      sprite.shell.style.left = `${x}px`;
      sprite.shell.style.top = `${y}px`;
      sprite.shell.classList.toggle('facing-left', facing === 'left');
      sprite.shell.classList.toggle('facing-right', facing === 'right');
    }

    function tickOrbit(timestamp = 0) {
      const delta = lastFrameTime ? Math.min(32, timestamp - lastFrameTime) : 16;
      lastFrameTime = timestamp;
      sprites.forEach((sprite) => {
        sprite.progress += sprite.direction * currentSpeed * (delta / 16);
        applySpritePosition(sprite);
      });
      animationFrame = requestAnimationFrame(tickOrbit);
    }

    function setCruiseMode() {
      currentSpeed = cruiseSpeed;
      setSpriteState('typing');
    }

    function boostSprites() {
      currentSpeed = typingSpeed;
      setSpriteState('typing');
      clearTimeout(typingTimer);
      typingTimer = setTimeout(() => {
        setCruiseMode();
      }, 900);
    }

    function createMessage(role, text = '') {
      const message = document.createElement('div');
      message.className = `msg ${role}`;
      if (role === 'bot') {
        message.classList.add('assistant');
      }

      const content = document.createElement('div');
      content.className = 'msg-content';
      content.textContent = text;

      message.appendChild(content);
      chatBox.appendChild(message);
      chatBox.scrollTop = chatBox.scrollHeight;

      return content;
    }

    function removeMessageActions(content) {
      const message = content.parentElement;
      const actions = message.querySelector('.msg-actions');
      if (actions) {
        actions.remove();
      }
    }

    function createIconMarkup(type) {
      if (type === 'copy') {
        return `
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <rect x="9" y="9" width="10" height="10" rx="2"></rect>
            <path d="M15 9V7a2 2 0 0 0-2-2H7a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"></path>
          </svg>
        `;
      }

      return `
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M20 11a8 8 0 1 0 2.2 5.5"></path>
          <path d="M20 4v7h-7"></path>
        </svg>
      `;
    }

    function attachMessageActions(content, query) {
      removeMessageActions(content);
      const message = content.parentElement;
      const actions = document.createElement('div');
      actions.className = 'msg-actions';

      const copyButton = document.createElement('button');
      copyButton.className = 'msg-action-btn';
      copyButton.type = 'button';
      copyButton.title = 'Copy';
      copyButton.innerHTML = `${createIconMarkup('copy')}<span class="msg-action-label">Copy</span>`;
      copyButton.addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(content.textContent || '');
          copyButton.style.color = '#c96442';
          setTimeout(() => {
            copyButton.style.color = '';
          }, 900);
        } catch (error) {
          console.error('Copy failed', error);
        }
      });

      const regenButton = document.createElement('button');
      regenButton.className = 'msg-action-btn';
      regenButton.type = 'button';
      regenButton.title = 'Regenerate';
      regenButton.innerHTML = `${createIconMarkup('regen')}<span class="msg-action-label">Retry</span>`;
      regenButton.addEventListener('click', async () => {
        if (!query || isStreaming) return;
        isStreaming = true;
        input.disabled = true;
        sendButton.disabled = true;
        removeMessageActions(content);
        const thinking = createThinkingPlaceholder();
        message.insertBefore(thinking.content, actions);

        try {
          const answer = await askBackend(query);
          thinking.timer.stop();
          await streamBotReply(answer, thinking.content, query);
          content.remove();
        } catch (error) {
          thinking.timer.stop();
          await streamBotReply(`Backend error: ${error.message}`, thinking.content, query);
          content.remove();
        }

        isStreaming = false;
        input.disabled = false;
        sendButton.disabled = false;
        input.focus();
      });

      actions.appendChild(copyButton);
      actions.appendChild(regenButton);
      message.appendChild(actions);
    }

    function createThinkingPlaceholder() {
      const content = createMessage('bot', 'Thinking...');
      content.classList.add('thinking-inline');

      const frames = [
        'T',
        'Th',
        'Thi',
        'Thin',
        'Think',
        'Thinki',
        'Thinkin',
        'Thinking',
        'Thinking.',
        'Thinking..',
        'Thinking...',
      ];
      const frameDelays = [55, 65, 75, 85, 95, 110, 125, 145, 175, 210, 250];
      let frameIndex = 0;
      let stopped = false;

      function tick() {
        if (stopped) {
          return;
        }
        content.textContent = frames[frameIndex];
        const delay = frameDelays[frameIndex];
        frameIndex = (frameIndex + 1) % frames.length;
        setTimeout(tick, delay);
      }

      tick();
      return {
        content,
        timer: {
          stop() {
            stopped = true;
          },
        },
      };
    }

    function streamBotReply(text, existingContent = null, query = '') {
      return streamMessage('bot', text, 38, 180, existingContent, query);
    }

    async function askBackend(query) {
      const response = await fetch('http://127.0.0.1:8000/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query, top_k: 5 })
      });

      if (!response.ok) {
        let detail = 'request failed';
        try {
          const payload = await response.json();
          detail = payload.detail || detail;
        } catch (error) {
          detail = `${detail} (${response.status})`;
        }
        throw new Error(detail);
      }

      const payload = await response.json();
      return payload.answer || 'No answer returned.';
    }

    function streamMessage(role, text, speed = 38, initialDelay = 0, existingContent = null, query = '') {
      clearTimeout(streamTimer);
      const content = existingContent || createMessage(role, '');
      if (existingContent) {
        content.classList.remove('thinking-inline');
        content.textContent = '';
        removeMessageActions(content);
      }
      let index = 0;

      return new Promise((resolve) => {
        function tick() {
          index += 1;
          content.textContent = text.slice(0, index);
          chatBox.scrollTop = chatBox.scrollHeight;

          if (index < text.length) {
            streamTimer = setTimeout(tick, speed);
          } else {
            if (role === 'bot') {
              attachMessageActions(content, query);
            }
            resolve();
          }
        }

        if (!text.length) {
          resolve();
          return;
        }

        streamTimer = setTimeout(tick, initialDelay);
      });
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text || isStreaming) return;
      isStreaming = true;
      input.disabled = true;
      sendButton.disabled = true;
      input.value = '';
      clearTimeout(typingTimer);
      boostSprites();

      await streamMessage('user', text, 24, 0);
      const thinking = createThinkingPlaceholder();

      try {
        const answer = await askBackend(text);
        thinking.timer.stop();
        await streamBotReply(answer, thinking.content, text);
      } catch (error) {
        thinking.timer.stop();
        await streamBotReply(`Backend error: ${error.message}`, thinking.content, text);
      }

      setCruiseMode();
      input.disabled = false;
      sendButton.disabled = false;
      input.focus();
      isStreaming = false;
    }
    input.addEventListener('input', () => {
      boostSprites();
    });
    input.addEventListener('blur', () => {
      clearTimeout(typingTimer);
      setCruiseMode();
    });
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
    window.addEventListener('resize', () => {
      sprites.forEach((sprite) => {
        applySpritePosition(sprite);
      });
    });
    setCruiseMode();
    sprites[1].progress = getTrackMetrics(sprites[1]).perimeter / 2;
    sprites.forEach((sprite) => {
      applySpritePosition(sprite);
    });
    animationFrame = requestAnimationFrame(tickOrbit);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>区块链工具箱</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --font-serif: Georgia, 'Times New Roman', serif;
      --font-sans: 'Inter', 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', Arial, sans-serif;
      --bg-page: #f5f4ed;
      --bg-surface: #faf9f5;
      --bg-user: #ebe5d8;
      --bg-bot: #fffefb;
      --bg-input: #faf9f5;
      --bg-toggle: #faf9f5;
      --bg-toggle-active: #e8e6dc;
      --text-primary: #141413;
      --text-secondary: #5e5d59;
      --text-user: #3d3d3a;
      --text-muted: #87867f;
      --border-soft: #f0eee6;
      --border-warm: #e8e6dc;
      --ring-warm: #d1cfc5;
      --accent: #c96442;
      --shadow-soft: rgba(20,20,19,0.03);
      --shadow-lift: rgba(0,0,0,0.03);
      --theme-button-text: #141413;
    }

    body[data-theme="dark"] {
      --bg-page: #141413;
      --bg-surface: #30302e;
      --bg-user: #4d3f33;
      --bg-bot: #2a2a28;
      --bg-input: #232321;
      --bg-toggle: #232321;
      --bg-toggle-active: #30302e;
      --text-primary: #faf9f5;
      --text-secondary: #b0aea5;
      --text-user: #faf9f5;
      --text-muted: #87867f;
      --border-soft: #30302e;
      --border-warm: #4d4c48;
      --ring-warm: #4d4c48;
      --accent: #d97757;
      --shadow-soft: rgba(0,0,0,0.18);
      --shadow-lift: rgba(0,0,0,0.12);
      --theme-button-text: #faf9f5;
    }

    body {
      min-height: 100vh;
      background: var(--bg-page);
      color: var(--text-primary);
      font-family: var(--font-sans);
      line-height: 1.60;
      transition: background 0.25s ease, color 0.25s ease;
      overflow: hidden;
    }

    .layout {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    .main {
      flex: 1;
      padding: 28px 20px 28px 28px;
      min-width: 0;
      height: 100vh;
      overflow: hidden;
    }

    .workspace-shell {
      height: calc(100vh - 56px);
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr);
      gap: 20px;
    }

    .workspace-sidebar {
      background: var(--bg-surface);
      border: 1px solid var(--border-soft);
      border-radius: 24px;
      box-shadow: 0 4px 24px var(--shadow-soft);
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .brand-mark {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 6px 6px 2px;
    }

    .brand-title {
      color: var(--accent);
      font-family: var(--font-serif);
      font-size: 28px;
      line-height: 1.1;
      letter-spacing: -0.03em;
    }

    .brand-subtitle {
      margin-top: 4px;
      color: var(--text-secondary);
      font-size: 13px;
      line-height: 1.5;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 6px color-mix(in srgb, var(--accent) 16%, transparent);
      flex: 0 0 auto;
    }

    .nav-group-label {
      padding: 0 8px;
      color: var(--text-muted);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .nav-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .nav-item {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 14px;
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid transparent;
      border-radius: 18px;
      box-shadow: none;
      font-family: var(--font-sans);
      font-size: 15px;
      line-height: 1.2;
      text-align: left;
    }

    .nav-item:hover {
      background: color-mix(in srgb, var(--bg-toggle-active) 72%, transparent);
      color: var(--text-primary);
      opacity: 1;
    }

    .nav-item.active {
      background: color-mix(in srgb, var(--bg-toggle-active) 88%, transparent);
      color: var(--text-primary);
      border-color: var(--border-warm);
      box-shadow: 0 0 0 1px var(--shadow-lift);
    }

    .nav-icon {
      width: 30px;
      height: 30px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--accent) 14%, var(--bg-surface));
      color: var(--accent);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-serif);
      font-size: 14px;
      flex: 0 0 auto;
    }

    .workspace-panel {
      background: var(--bg-surface);
      border: 1px solid var(--border-soft);
      border-radius: 32px;
      box-shadow: 0 4px 24px var(--shadow-soft);
      padding: 34px 34px 28px;
      height: 100%;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 28px;
      overflow: hidden;
    }

    .workspace-view {
      display: none;
      min-width: 0;
    }

    .workspace-view.active {
      display: flex;
      flex-direction: column;
      gap: 28px;
      flex: 1;
      min-height: 0;
    }

    .workspace-empty {
      flex: 1;
      min-height: 0;
      border: 1px dashed var(--border-warm);
      border-radius: 28px;
      background: color-mix(in srgb, var(--bg-toggle-active) 28%, transparent);
      box-shadow: inset 0 0 0 1px var(--shadow-lift);
    }

    .market-shell {
      display: flex;
      flex-direction: column;
      min-width: 0;
      padding-top: 2px;
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .market-board {
      border: 1px solid var(--border-soft);
      border-radius: 26px;
      background: var(--bg-surface);
      box-shadow: 0 4px 24px var(--shadow-soft);
      overflow: hidden;
      min-width: 0;
      max-height: 500px;
      display: flex;
      flex-direction: column;
    }

    .market-header,
    .market-row {
      display: grid;
      grid-template-columns: 2.1fr 1fr 0.9fr 1.25fr 1.1fr 1.1fr;
      gap: 16px;
      align-items: center;
      min-width: 0;
    }

    .market-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border-soft);
      color: var(--text-muted);
      font-family: var(--font-serif);
      font-size: 13px;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .market-rows {
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      max-height: 442px;
      scrollbar-width: thin;
      scrollbar-color: var(--border-warm) transparent;
    }

    .market-rows::-webkit-scrollbar {
      width: 10px;
    }

    .market-rows::-webkit-scrollbar-track {
      background: transparent;
    }

    .market-rows::-webkit-scrollbar-thumb {
      background: color-mix(in srgb, var(--border-warm) 90%, transparent);
      border-radius: 999px;
      border: 2px solid transparent;
      background-clip: padding-box;
    }

    .market-news-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin-top: 18px;
      flex: 1;
      min-height: 0;
    }

    .market-news-card {
      display: flex;
      flex-direction: column;
      min-height: 320px;
      padding: 16px 18px 16px;
      border-radius: 24px;
      border: 1px solid var(--border-warm);
      background: color-mix(in srgb, var(--bg-toggle-active) 40%, var(--bg-surface));
      box-shadow: 0 0 0 1px var(--shadow-lift);
    }

    .market-news-kicker {
      color: var(--accent);
      font-family: var(--font-sans);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .market-news-title {
      margin-top: 8px;
      color: var(--text-primary);
      font-family: var(--font-serif);
      font-size: 18px;
      line-height: 1.18;
      letter-spacing: -0.02em;
    }

    .market-news-copy {
      margin-top: 8px;
      color: var(--text-secondary);
      font-family: var(--font-sans);
      font-size: 13px;
      line-height: 1.6;
    }

    .market-news-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-top: 16px;
      color: var(--text-muted);
      font-family: var(--font-sans);
      font-size: 12px;
      letter-spacing: 0.02em;
    }

    .market-news-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 12px;
      overflow-y: auto;
      padding-right: 4px;
      max-height: 228px;
      scrollbar-width: thin;
      scrollbar-color: var(--border-warm) transparent;
    }

    .market-news-list::-webkit-scrollbar {
      width: 8px;
    }

    .market-news-list::-webkit-scrollbar-track {
      background: transparent;
    }

    .market-news-list::-webkit-scrollbar-thumb {
      background: color-mix(in srgb, var(--border-warm) 90%, transparent);
      border-radius: 999px;
    }

    .market-news-item {
      display: block;
      padding-top: 12px;
      border-top: 1px solid var(--border-soft);
      color: inherit;
      text-decoration: none;
    }

    .market-news-item:hover .market-news-item-title {
      color: var(--accent);
    }

    .market-news-item-title {
      color: var(--text-primary);
      font-family: var(--font-serif);
      font-size: 16px;
      line-height: 1.35;
      letter-spacing: -0.01em;
      transition: color 0.18s ease;
    }

    .market-news-item-copy {
      margin-top: 6px;
      color: var(--text-secondary);
      font-family: var(--font-sans);
      font-size: 13px;
      line-height: 1.6;
    }

    .market-news-item-meta {
      margin-top: 8px;
      color: var(--text-muted);
      font-family: var(--font-sans);
      font-size: 11px;
      line-height: 1.5;
    }

    .market-row {
      padding: 16px 20px;
      border-top: 1px solid var(--border-soft);
    }

    .market-row:first-child {
      border-top: none;
    }

    .market-asset {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .market-coin-mark {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--accent) 16%, var(--bg-surface));
      color: var(--accent);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-serif);
      font-size: 15px;
      font-weight: 600;
      flex: 0 0 auto;
      overflow: hidden;
    }

    .market-coin-mark img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .market-asset-text {
      min-width: 0;
    }

    .market-symbol {
      color: var(--text-primary);
      font-family: var(--font-serif);
      font-size: 16px;
      line-height: 1.08;
      font-weight: 500;
      letter-spacing: -0.02em;
    }

    .market-name {
      margin-top: 2px;
      color: var(--text-secondary);
      font-family: var(--font-serif);
      font-size: 11px;
      line-height: 1.45;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .market-price,
    .market-cap,
    .market-range {
      color: var(--text-primary);
      font-family: var(--font-serif);
      font-size: 16px;
      line-height: 1.4;
      letter-spacing: -0.01em;
      font-weight: 500;
    }

    .market-change {
      font-family: var(--font-serif);
      font-size: 16px;
      line-height: 1.2;
      font-weight: 500;
      letter-spacing: -0.01em;
    }

    .market-change.up {
      color: #1d8f54;
    }

    .market-change.down {
      color: #b53333;
    }

    .market-sparkline {
      width: 100%;
      height: 46px;
    }

    .market-sparkline path {
      transition: d 0.35s ease, stroke 0.25s ease;
    }

    .market-range {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .market-range-track {
      position: relative;
      width: 100%;
      height: 3px;
      border-radius: 999px;
      background: var(--border-warm);
      overflow: hidden;
    }

    .market-range-fill {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      border-radius: inherit;
      background: var(--accent);
    }

    .market-range-values {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--text-secondary);
      font-family: var(--font-serif);
      font-size: 12px;
      line-height: 1.4;
      letter-spacing: 0;
    }

    .hero-block {
      display: flex;
      justify-content: space-between;
      gap: 24px;
      align-items: flex-start;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border-soft);
    }

    .hero-eyebrow {
      color: var(--accent);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .hero-title {
      max-width: 700px;
      color: var(--text-primary);
      font-family: var(--font-serif);
      font-size: 52px;
      line-height: 1.05;
      letter-spacing: -0.04em;
    }

    .hero-copy {
      max-width: 760px;
      margin-top: 16px;
      color: var(--text-secondary);
      font-size: 18px;
      line-height: 1.65;
    }

    .hero-stat {
      min-width: 180px;
      padding: 18px 18px 16px;
      border: 1px solid var(--border-warm);
      border-radius: 20px;
      background: color-mix(in srgb, var(--bg-toggle-active) 48%, var(--bg-surface));
      box-shadow: 0 0 0 1px var(--shadow-lift);
    }

    .hero-stat-label {
      color: var(--text-muted);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .hero-stat-value {
      margin-top: 10px;
      color: var(--text-primary);
      font-family: var(--font-serif);
      font-size: 34px;
      line-height: 1;
    }

    .section-title {
      color: var(--text-primary);
      font-family: var(--font-serif);
      font-size: 28px;
      line-height: 1.1;
      letter-spacing: -0.03em;
      margin-bottom: 16px;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .info-card {
      padding: 20px 20px 18px;
      background: color-mix(in srgb, var(--bg-toggle-active) 40%, var(--bg-surface));
      border: 1px solid var(--border-warm);
      border-radius: 22px;
      box-shadow: 0 0 0 1px var(--shadow-lift);
      min-width: 0;
    }

    .info-card-wide {
      grid-column: 1 / -1;
    }

    .card-kicker {
      color: var(--accent);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .card-title {
      color: var(--text-primary);
      font-family: var(--font-serif);
      font-size: 24px;
      line-height: 1.15;
      letter-spacing: -0.02em;
    }

    .card-copy {
      margin-top: 12px;
      color: var(--text-secondary);
      font-size: 15px;
      line-height: 1.7;
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 32px;
      padding: 0 12px;
      border-radius: 999px;
      border: 1px solid var(--border-warm);
      background: var(--bg-surface);
      color: var(--text-secondary);
      font-size: 13px;
      line-height: 1;
    }

    .list-panel {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .list-card {
      padding: 20px;
      border-radius: 22px;
      border: 1px solid var(--border-soft);
      background: var(--bg-surface);
      box-shadow: 0 0 0 1px var(--shadow-lift);
    }

    .list-card h4 {
      color: var(--text-primary);
      font-family: var(--font-serif);
      font-size: 22px;
      line-height: 1.2;
      letter-spacing: -0.02em;
    }

    .mini-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 14px;
    }

    .mini-item {
      padding-top: 12px;
      border-top: 1px solid var(--border-soft);
      color: var(--text-secondary);
      font-size: 15px;
      line-height: 1.6;
    }

    .mini-item strong {
      color: var(--text-primary);
      font-weight: 600;
    }

    .right-panel {
      width: 33.33%;
      padding: 40px 32px;
      position: relative;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .theme-toggle {
      position: absolute;
      top: 28px;
      right: 32px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px;
      background: var(--bg-toggle);
      border: 1px solid var(--border-soft);
      border-radius: 999px;
      box-shadow: 0 0 0 1px var(--shadow-lift);
      z-index: 5;
    }

    .theme-chip {
      border: none;
      border-radius: 999px;
      padding: 8px 12px;
      min-width: 56px;
      background: transparent;
      color: var(--text-secondary);
      box-shadow: none;
      font-family: var(--font-sans);
      font-size: 13px;
      line-height: 1;
      font-weight: 500;
      letter-spacing: 0.01em;
      cursor: pointer;
    }

    .theme-chip.active {
      background: var(--bg-toggle-active);
      color: var(--theme-button-text);
      box-shadow: 0 0 0 1px var(--ring-warm);
    }

    .chat-stage::before {
      content: 'JwtZZz1';
      position: absolute;
      top: -74px;
      left: 0;
      color: var(--text-primary);
      font-family: var(--font-serif);
      font-size: 28px;
      line-height: 1.2;
      letter-spacing: -0.02em;
    }

    .chat-stage {
      position: relative;
      margin-top: 56px;
      margin-bottom: 20px;
      flex: 1;
      min-height: 0;
    }

    .chat-box {
      background: var(--bg-surface);
      border: 1px solid var(--border-soft);
      border-radius: 12px;
      height: 100%;
      min-height: 0;
      overflow: auto;
      padding: 20px;
      box-shadow: 0px 0px 0px 1px var(--shadow-lift);
      scrollbar-width: none;
      -ms-overflow-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .chat-box::-webkit-scrollbar {
      display: none;
    }

    .msg {
      max-width: 78%;
      padding: 10px 14px;
      border-radius: 14px;
      font-family: var(--font-sans);
      font-size: 15px;
      line-height: 1.45;
      box-shadow: 0 4px 12px var(--shadow-soft);
    }

    .msg.user {
      align-self: flex-end;
      background: var(--bg-user);
      color: var(--text-user);
    }

    .msg.bot {
      align-self: flex-start;
      background: var(--bg-bot);
      border: 1px solid var(--border-warm);
    }

    .msg.assistant {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
    }

    .msg-content {
      color: var(--text-primary);
      font-family: var(--font-serif);
      font-size: 16px;
      line-height: 1.45;
      letter-spacing: -0.01em;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .thinking-inline {
      display: inline-block;
    }

    .msg-actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      padding-left: 4px;
      margin-top: 2px;
    }

    .msg-action-btn {
      min-width: 0;
      height: 32px;
      padding: 0 12px 0 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: var(--bg-surface);
      color: var(--text-secondary);
      border: 1px solid var(--border-warm);
      border-radius: 999px;
      box-shadow: 0 0 0 1px var(--shadow-lift);
      font-family: var(--font-sans);
      font-size: 13px;
      line-height: 1;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
    }

    .msg-action-btn:hover {
      background: var(--border-warm);
      color: var(--text-primary);
      border-color: var(--ring-warm);
    }

    .msg-action-btn svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .msg-action-label {
      display: inline-block;
      white-space: nowrap;
    }


    .msg p { margin: 0; }

    .chat-sprite-track {
      position: absolute;
      inset: -22px;
      pointer-events: none;
      z-index: 2;
    }

    .input-row {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .input-wrap {
      flex: 1;
      position: relative;
    }

    .input-sprite-track {
      position: absolute;
      inset: -18px;
      pointer-events: none;
      z-index: 2;
    }

    .sprite-shell {
      position: absolute;
      left: 0;
      top: 0;
      width: 64px;
      height: 64px;
      animation: sprite-bob 900ms ease-in-out infinite alternate;
      will-change: transform;
    }

    .sprite-avatar {
      width: 32px;
      height: 32px;
      background-image: url('/sheet.png');
      background-repeat: no-repeat;
      image-rendering: pixelated;
      transform: scale(2);
      transform-origin: top left;
    }

    .sprite-avatar.idle {
      background-position: 0 -16px;
    }

    .sprite-avatar.typing {
      background-position: 0 -64px;
      animation: run-cycle 820ms steps(7) infinite;
    }

    .sprite-shell.facing-left .sprite-avatar {
      transform: translateX(64px) scale(-2, 2);
      transform-origin: top left;
    }

    .sprite-shell.facing-right .sprite-avatar {
      transform: scale(2);
      transform-origin: top left;
    }

    @keyframes run-cycle {
      from { background-position: 0 -64px; }
      to { background-position: -224px -64px; }
    }

    @keyframes sprite-bob {
      from { margin-top: 1px; }
      to { margin-top: -1px; }
    }


    input {
      flex: 1;

  <script>

    const marketData = [

      { symbol: 'TRX', name: 'Tron', category: 'Layer 1', price: '$0.33285', change: 1.01, low: '$0.32751', high: '$0.33451', cap: '$31.5B', spark: [44, 44, 43, 43, 43, 44, 45, 46, 49, 48, 49, 50] }

    let currentBriefs = { ...defaultBriefs };

    const sprites = [
      {

    function applyTheme(theme) {

    function switchWorkspace(viewName) {
      navItems.forEach((item) => {
        item.classList.toggle('active', item.dataset.view === viewName);

    function getSparklineSvg(points, trendUp) {
      const width = 144;
      const height = 46;
      const min = Math.min(...points);
      const max = Math.max(...points);
      const range = Math.max(1, max - min);
      const coords = points.map((point, index) => {
        const x = (index / Math.max(1, points.length - 1)) * width;
        const y = height - (((point - min) / range) * (height - 8) + 4);
        return { x, y };
      });
      const path = buildSmoothPath(coords);
      const stroke = trendUp ? '#1d8f54' : '#b53333';
      return `
        <svg class="market-sparkline" viewBox="0 0 ${width} ${height}" preserveAspectRatio="none" aria-hidden="true">
          <path d="${path}" fill="none" stroke="${stroke}" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"></path>
        </svg>
      `;
    }

    function buildSmoothPath(points) {
      if (!points.length) {
        return '';
      }
      if (points.length === 1) {
        return `M${points[0].x.toFixed(2)},${points[0].y.toFixed(2)}`;
      }

      let path = `M${points[0].x.toFixed(2)},${points[0].y.toFixed(2)}`;
      for (let i = 0; i < points.length - 1; i += 1) {
        const current = points[i];
        const next = points[i + 1];
        const prev = points[i - 1] || current;
        const after = points[i + 2] || next;

        const cp1x = current.x + (next.x - prev.x) / 6;
        const cp1y = current.y + (next.y - prev.y) / 6;
        const cp2x = next.x - (after.x - current.x) / 6;
        const cp2y = next.y - (after.y - current.y) / 6;

        path += ` C${cp1x.toFixed(2)},${cp1y.toFixed(2)} ${cp2x.toFixed(2)},${cp2y.toFixed(2)} ${next.x.toFixed(2)},${next.y.toFixed(2)}`;
      }
      return path;
    }

    function renderMarketRows(rows) {
      marketRowsEl.innerHTML = rows.map((coin) => {
        const trendUp = coin.change >= 0;
        const fillWidth = trendUp ? 68 : 44;
        const coinMark = coin.image
          ? `<img src="${coin.image}" alt="${coin.symbol}">`
          : coin.symbol.slice(0, 2);
        return `
          <div class="market-row">
            <div class="market-asset">
              <div class="market-coin-mark">${coinMark}</div>
              <div class="market-asset-text">
                <div class="market-symbol">${coin.symbol}</div>
                <div class="market-name">${coin.name}</div>
              </div>
            </div>
            <div class="market-price">${coin.price}</div>
            <div class="market-change ${trendUp ? 'up' : 'down'}">${coin.change > 0 ? '+' : ''}${coin.change.toFixed(2)}%</div>
            <div>${getSparklineSvg(coin.spark, trendUp)}</div>
            <div class="market-range">
              <div class="market-range-track"><span class="market-range-fill" style="width:${fillWidth}%"></span></div>
              <div class="market-range-values"><span>${coin.low}</span><span>${coin.high}</span></div>
            </div>
            <div class="market-cap">${coin.cap}</div>
          </div>
        `;
      }).join('');
    }

    function renderBriefColumn(title, kicker, items) {
      return `
        <section class="market-news-card">
          <div class="market-news-kicker">${kicker}</div>
          <div class="market-news-title">${title}</div>
          <div class="market-news-copy">Updated every five hours. Scroll inside this panel to browse the latest items without stretching the whole page.</div>
          <div class="market-news-list">
            ${items.map((item) => `
              <a class="market-news-item" href="${item.url}" target="_blank" rel="noreferrer">
                <div class="market-news-item-title">${item.title}</div>
                <div class="market-news-item-copy">${item.summary || 'Open the source for the full thread or article.'}</div>
                <div class="market-news-item-meta">${item.source || 'Source'}${item.published_at ? ` · ${item.published_at}` : ''}</div>
              </a>
            `).join('')}
          </div>
        </section>
      `;
    }

    function renderMarketNews() {
      const socialItems = (currentBriefs.social && currentBriefs.social.length) ? currentBriefs.social : defaultBriefs.social;
      const newsItems = (currentBriefs.news && currentBriefs.news.length) ? currentBriefs.news : defaultBriefs.news;
      marketNewsGridEl.innerHTML = [
        renderBriefColumn('X Watch', 'Social commentary', socialItems),
        renderBriefColumn('Finance News', 'Latest headlines', newsItems),
      ].join('');
    }

    async function loadMarketBriefs() {
      try {
        const response = await fetch(`${API_BASE}/market/briefs`);
        if (!response.ok) {
          throw new Error(`briefs request failed (${response.status})`);
        }
        const payload = await response.json();
        currentBriefs = {
          social: Array.isArray(payload.social) ? payload.social : defaultBriefs.social,
          news: Array.isArray(payload.news) ? payload.news : defaultBriefs.news,
        };
      } catch (error) {
        console.error('Briefs fallback', error);
        currentBriefs = { ...defaultBriefs };
      }
      renderMarketNews();
    }

    function formatUsdValue(value) {
      if (!Number.isFinite(value) || value <= 0) {
        return '--';
      }
      if (value >= 1000) {
        return `$${value.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
      }
      if (value >= 1) {
        return `$${value.toLocaleString(undefined, { minimumFractionDigits: 4, maximumFractionDigits: 4 })}`;
      }
      return `$${value.toLocaleString(undefined, { minimumFractionDigits: 5, maximumFractionDigits: 5 })}`;
    }

    async function loadMarketData() {
      if (marketRequestInFlight) {
        return;
      }
      marketRequestInFlight = true;
      try {
        const response = await fetch(`${API_BASE}/market/coins`);
        if (!response.ok) {
          throw new Error(`market request failed (${response.status})`);
        }
        const payload = await response.json();
        if (Array.isArray(payload.coins) && payload.coins.length) {
          currentMarketRows = payload.coins;
        }
      } catch (error) {
        console.error('Market data fallback', error);
        currentMarketRows = [...marketData];
      } finally {
        marketRequestInFlight = false;
      }
      renderMarketRows(currentMarketRows);
    }

    function renderMarkets() {
      renderMarketRows(currentMarketRows);
      renderMarketNews();
    }

    function startMarketRefresh() {
      if (marketRefreshTimer) {
        clearInterval(marketRefreshTimer);
      }
      marketRefreshTimer = setInterval(() => {
        loadMarketData();
      }, MARKET_REFRESH_MS);
    }

    function setSpriteState(state) {
      sprites.forEach((sprite) => {
        sprite.avatar.classList.remove('idle', 'typing');
        sprite.avatar.classList.add(state);
      });
    }

    function getTrackMetrics(sprite) {
      const width = Math.max(0, sprite.track.clientWidth - spriteWidth);
      const height = Math.max(0, sprite.track.clientHeight - spriteWidth);
      const perimeter = Math.max(1, 2 * (width + height));
      return { width, height, perimeter };
    }

    function getOrbitPosition(sprite) {
      const { width, height, perimeter } = getTrackMetrics(sprite);
      let progress = sprite.progress % perimeter;

      if (progress < 0) {
        progress += perimeter;
      }

      if (progress <= width) {
        return {
          x: progress,
          y: 0,
          facing: sprite.direction > 0 ? 'right' : 'left',
        };
      }

      if (progress <= width + height) {
        return {
          x: width,
          y: progress - width,
          facing: sprite.direction > 0 ? 'right' : 'left',
        };
      }

      if (progress <= (2 * width) + height) {
        return {
          x: width - (progress - width - height),
          y: height,
          facing: sprite.direction > 0 ? 'left' : 'right',
        };
      }

      return {
        x: 0,
        y: height - (progress - (2 * width) - height),
        facing: sprite.direction > 0 ? 'left' : 'right',
      };
    }

    function applySpritePosition(sprite) {
      const { x, y, facing } = getOrbitPosition(sprite);
      sprite.shell.style.left = `${x}px`;
      sprite.shell.style.top = `${y}px`;
      sprite.shell.classList.toggle('facing-left', facing === 'left');
      sprite.shell.classList.toggle('facing-right', facing === 'right');
    }

    function tickOrbit(timestamp = 0) {
      const delta = lastFrameTime ? Math.min(32, timestamp - lastFrameTime) : 16;
      lastFrameTime = timestamp;
      sprites.forEach((sprite) => {
        sprite.progress += sprite.direction * currentSpeed * (delta / 16);
        applySpritePosition(sprite);
      });
      animationFrame = requestAnimationFrame(tickOrbit);
    }

    function setCruiseMode() {
      currentSpeed = cruiseSpeed;
      setSpriteState('typing');
    }

    function boostSprites() {
      currentSpeed = typingSpeed;
      setSpriteState('typing');
      clearTimeout(typingTimer);
      typingTimer = setTimeout(() => {
        setCruiseMode();
      }, 900);
    }

    function createMessage(role, text = '') {
      const message = document.createElement('div');
      message.className = `msg ${role}`;
      if (role === 'bot') {
        message.classList.add('assistant');
      }

      const content = document.createElement('div');
      content.className = 'msg-content';
      content.textContent = text;

      message.appendChild(content);
      chatBox.appendChild(message);
      chatBox.scrollTop = chatBox.scrollHeight;

      return content;
    }

    function removeMessageActions(content) {
      const message = content.parentElement;
      const actions = message.querySelector('.msg-actions');
      if (actions) {
        actions.remove();
      }
    }

    function createIconMarkup(type) {
      if (type === 'copy') {
        return `
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <rect x="9" y="9" width="10" height="10" rx="2"></rect>
            <path d="M15 9V7a2 2 0 0 0-2-2H7a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"></path>
          </svg>
        `;
      }

      return `
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M20 11a8 8 0 1 0 2.2 5.5"></path>
          <path d="M20 4v7h-7"></path>
        </svg>
      `;
    }

    function attachMessageActions(content, query) {
      removeMessageActions(content);
      const message = content.parentElement;
      const actions = document.createElement('div');
      actions.className = 'msg-actions';

      const copyButton = document.createElement('button');
      copyButton.className = 'msg-action-btn';
      copyButton.type = 'button';
      copyButton.title = 'Copy';
      copyButton.innerHTML = `${createIconMarkup('copy')}<span class="msg-action-label">Copy</span>`;
      copyButton.addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(content.textContent || '');
          copyButton.style.color = '#c96442';
          setTimeout(() => {
            copyButton.style.color = '';
          }, 900);
        } catch (error) {
          console.error('Copy failed', error);
        }
      });

      const regenButton = document.createElement('button');
      regenButton.className = 'msg-action-btn';
      regenButton.type = 'button';
      regenButton.title = 'Regenerate';
      regenButton.innerHTML = `${createIconMarkup('regen')}<span class="msg-action-label">Retry</span>`;
      regenButton.addEventListener('click', async () => {
        if (!query || isStreaming) return;
        isStreaming = true;
        input.disabled = true;
        sendButton.disabled = true;
        removeMessageActions(content);
        content.classList.add('thinking-inline');

        const frames = [
          'T',
          'Th',
          'Thi',
          'Thin',
          'Think',
          'Thinki',
          'Thinkin',
          'Thinking',
          'Thinking.',
          'Thinking..',
          'Thinking...',
        ];
        const frameDelays = [55, 65, 75, 85, 95, 110, 125, 145, 175, 210, 250];
        let frameIndex = 0;
        let stopped = false;

        function tickThinking() {
          if (stopped) {
            return;
          }
          content.textContent = frames[frameIndex];
          const delay = frameDelays[frameIndex];
          frameIndex = (frameIndex + 1) % frames.length;
          setTimeout(tickThinking, delay);
        }

        tickThinking();

        try {
          const answer = await askBackend(query);
          stopped = true;
          await streamBotReply(answer, content, query);
        } catch (error) {
          stopped = true;
          await streamBotReply(`Backend error: ${error.message}`, content, query);
        }

        isStreaming = false;
        input.disabled = false;
        sendButton.disabled = false;
        input.focus();
      });

      actions.appendChild(copyButton);
      actions.appendChild(regenButton);
      message.appendChild(actions);
    }

    function createThinkingPlaceholder() {
      const content = createMessage('bot', 'Thinking...');
      content.classList.add('thinking-inline');

      const frames = [
        'T',
        'Th',
        'Thi',
        'Thin',
        'Think',
        'Thinki',
        'Thinkin',
        'Thinking',
        'Thinking.',
        'Thinking..',
        'Thinking...',
      ];
      const frameDelays = [55, 65, 75, 85, 95, 110, 125, 145, 175, 210, 250];
      let frameIndex = 0;
      let stopped = false;

      function tick() {
        if (stopped) {
          return;
        }
        content.textContent = frames[frameIndex];
        const delay = frameDelays[frameIndex];
        frameIndex = (frameIndex + 1) % frames.length;
        setTimeout(tick, delay);
      }

      tick();
      return {
        content,
        timer: {
          stop() {
            stopped = true;
          },
        },
      };
    }

    function streamBotReply(text, existingContent = null, query = '') {
      return streamMessage('bot', text, 38, 180, existingContent, query);
    }

    async function askBackend(query) {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), REQUEST_TIMEOUT_MS);
      let response;

      try {
        response = await fetch(`${API_BASE}/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query, top_k: 5 }),
          signal: controller.signal,
        });
      } catch (error) {
        clearTimeout(timeoutId);
        if (error.name === 'AbortError') {
          throw new Error('Request timed out, please retry.');
        }
        throw error;
      }

      clearTimeout(timeoutId);

      if (!response.ok) {
        let detail = 'request failed';
        try {
          const payload = await response.json();
          detail = payload.detail || detail;
        } catch (error) {
          detail = `${detail} (${response.status})`;
        }
        throw new Error(detail);
      }

      const payload = await response.json();
      return payload.answer || 'No answer returned.';
    }

    function streamMessage(role, text, speed = 38, initialDelay = 0, existingContent = null, query = '') {
      clearTimeout(streamTimer);
      const content = existingContent || createMessage(role, '');
      if (existingContent) {
        content.classList.remove('thinking-inline');
        content.textContent = '';
        removeMessageActions(content);
      }
      let index = 0;

      return new Promise((resolve) => {
        function tick() {
          index += 1;
          content.textContent = text.slice(0, index);
          chatBox.scrollTop = chatBox.scrollHeight;

          if (index < text.length) {
            streamTimer = setTimeout(tick, speed);
          } else {
            if (role === 'bot') {
              attachMessageActions(content, query);
            }
            resolve();
          }
        }

        if (!text.length) {
          resolve();
          return;
        }

        streamTimer = setTimeout(tick, initialDelay);
      });
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text || isStreaming) return;
      isStreaming = true;
      input.disabled = true;
      sendButton.disabled = true;
      input.value = '';
      clearTimeout(typingTimer);
      boostSprites();

      await streamMessage('user', text, 24, 0);
      const thinking = createThinkingPlaceholder();

      try {
        const answer = await askBackend(text);
        thinking.timer.stop();
        await streamBotReply(answer, thinking.content, text);
      } catch (error) {
        thinking.timer.stop();
        await streamBotReply(`Backend error: ${error.message}`, thinking.content, text);
      }

      setCruiseMode();
      input.disabled = false;
      sendButton.disabled = false;
      input.focus();
      isStreaming = false;
    }
    input.addEventListener('input', () => {
      boostSprites();
    });
    input.addEventListener('blur', () => {
      clearTimeout(typingTimer);
      setCruiseMode();
    });
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
    lightModeBtn.addEventListener('click', () => applyTheme('light'));
    darkModeBtn.addEventListener('click', () => applyTheme('dark'));
    navItems.forEach((item) => {
      item.addEventListener('click', () => switchWorkspace(item.dataset.view));
    });
    window.addEventListener('resize', () => {
      sprites.forEach((sprite) => {
        applySpritePosition(sprite);
      });
    });
    applyTheme(localStorage.getItem(THEME_KEY) || 'light');
    renderMarkets();
    loadMarketData();
    loadMarketBriefs();
    startMarketRefresh();
    switchWorkspace('markets');
    setCruiseMode();
    sprites[1].progress = getTrackMetrics(sprites[1]).perimeter / 2;
    sprites.forEach((sprite) => {
      applySpritePosition(sprite);
    });
    animationFrame = requestAnimationFrame(tickOrbit);
  </script>
</body>
</html>
